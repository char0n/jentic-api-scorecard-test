name: API readiness

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # required so SARIF uploads to the Security tab

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jentic/jentic-api-scorecard@fix/200-sarif-url-artifact-uri
        with:
          input: ./openapi.json
          min-score: '60'
          summary-detail: signals
