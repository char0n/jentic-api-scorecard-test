name: API readiness

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write # required so SARIF uploads to the Security tab

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jentic/jentic-api-scorecard@c2ed59d08c5ad6f280cba102c99634c7fb3397e5
        with:
          input: https://raw.githubusercontent.com/jentic/jentic-public-apis/refs/heads/main/apis/openapi/swagger-api/petstore/1.0.27/openapi.json
          min-score: '60'
          summary-detail: signals
